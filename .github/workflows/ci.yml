name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: sample-nodejs-hummingbird

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Verify server starts
        run: |
          node server.js &
          sleep 2
          curl -sf http://localhost:8080/health | grep healthy
          curl -sf http://localhost:8080/ | grep nodeVersion
          curl -sf http://localhost:8080/transform/sample | grep HELLO
          curl -sf -X POST http://localhost:8080/transform \
            -H "Content-Type: application/json" \
            -d '{"text":"ci test","operation":"reverse"}' | grep "tset ic"
          kill %1

  container-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: |
          docker build -f Containerfile -t $IMAGE_NAME:ci .

      - name: Smoke-test container
        run: |
          docker run -d --name smoke -p 8080:8080 $IMAGE_NAME:ci
          sleep 3
          curl -sf http://localhost:8080/health | grep healthy
          docker stop smoke

  security-scan:
    runs-on: ubuntu-latest
    needs: container-build
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: |
          docker build -f Containerfile -t $IMAGE_NAME:scan .

      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.IMAGE_NAME }}:scan
          fail-build: true
          severity-cutoff: high

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:scan
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
